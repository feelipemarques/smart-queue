spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart-queue
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
app:
  cors:
    allowed-origins: http://localhost:4200
